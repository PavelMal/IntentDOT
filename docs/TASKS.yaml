  # --- Phase 1: XCM Cross-Chain Transfers ---

  - id: T030
    subject: "Research XCM precompile: SCALE encoding, message format, testnet verification"
    status: completed
    priority: P0
    estimate_hours: 3
    owner: claude
    blocked_by: []
    tags: [research, xcm, pvm-track]
    notes: |
      Done. Key findings:
      - XCM precompile at 0xA0000: execute(), send(), weighMessage() — all work from EVM
      - Must use AccountId32 (H160 + 12 bytes 0xEE), NOT AccountKey20 — LocationToAccountId doesn't support AccountKey20
      - Must use PayFees (V5), not BuyExecution — required by barrier AllowTopLevelPaidExecutionFrom
      - Asset reference: parents:1, interior:Here for native PAS on Hub (relay chain token)
      - SCALE encoding via @polkadot/api connected to wss://sys.ibp.network/asset-hub-paseo
      - Local self-transfer: verified (status:1, -1 PAS fees)
      - Cross-chain teleport Hub→Relay: verified (17.99 PAS received on Paseo relay)
      - No Solidity contract needed — call precompile directly from frontend via viem
      - Existential deposit on Paseo relay: 1 PAS — must send enough to cover ED + fees
      - DryRunApi available for pre-flight checks

