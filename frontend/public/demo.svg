<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" width="520" height="460">
  <defs>
    <style>
      @keyframes cursor-blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
      @keyframes phase-typing { 0% { opacity: 1 } 18% { opacity: 1 } 19% { opacity: 0 } 100% { opacity: 0 } }
      @keyframes phase-thinking { 0%,18% { opacity: 0 } 19% { opacity: 1 } 30% { opacity: 1 } 31% { opacity: 0 } 100% { opacity: 0 } }
      @keyframes phase-preview { 0%,30% { opacity: 0 } 31% { opacity: 1 } 52% { opacity: 1 } 53% { opacity: 0 } 100% { opacity: 0 } }
      @keyframes phase-confirming { 0%,52% { opacity: 0 } 53% { opacity: 1 } 67% { opacity: 1 } 68% { opacity: 0 } 100% { opacity: 0 } }
      @keyframes phase-success { 0%,67% { opacity: 0 } 68% { opacity: 1 } 93% { opacity: 1 } 94% { opacity: 0 } 100% { opacity: 0 } }
      @keyframes dot1 { 0%,100% { opacity: 0.25 } 33% { opacity: 0.9 } }
      @keyframes dot2 { 0%,100% { opacity: 0.25 } 50% { opacity: 0.9 } }
      @keyframes dot3 { 0%,100% { opacity: 0.25 } 66% { opacity: 0.9 } }
      @keyframes spinner { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
      @keyframes check-draw { 0% { stroke-dashoffset: 30 } 100% { stroke-dashoffset: 0 } }
      @keyframes fade-in { 0% { opacity: 0; transform: translateY(6px) } 100% { opacity: 1; transform: translateY(0) } }

      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
      .phase-typing { animation: phase-typing 12s infinite; }
      .phase-thinking { animation: phase-thinking 12s infinite; }
      .phase-preview { animation: phase-preview 12s infinite; }
      .phase-confirming { animation: phase-confirming 12s infinite; }
      .phase-success { animation: phase-success 12s infinite; }
      .dot-1 { animation: dot1 1.2s ease-in-out infinite; }
      .dot-2 { animation: dot2 1.2s ease-in-out infinite; }
      .dot-3 { animation: dot3 1.2s ease-in-out infinite; }
      .blink { animation: cursor-blink 0.53s infinite; }
    </style>
    <linearGradient id="pink-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6007A"/>
      <stop offset="100%" stop-color="#9B30FF"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#110d1a"/>
      <stop offset="100%" stop-color="#0a0710"/>
    </linearGradient>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#E6007A" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#56F39A" flood-opacity="0.12"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="460" rx="20" fill="url(#bg-grad)"/>
  <rect x="1" y="1" width="518" height="458" rx="19" fill="none" stroke="#ffffff0c" stroke-width="1"/>

  <!-- ====== PHASE: TYPING ====== -->
  <g class="phase-typing">
    <!-- Input card -->
    <rect x="24" y="24" width="472" height="56" rx="16" fill="#ffffff05" stroke="#ffffff10" stroke-width="1"/>
    <!-- Input field -->
    <rect x="36" y="34" width="396" height="36" rx="12" fill="#ffffff06" stroke="#ffffff0c" stroke-width="0.7"/>
    <!-- Typed text with clip -->
    <clipPath id="tc">
      <rect x="50" y="34" height="36">
        <animate attributeName="width" values="0;0;200;200" keyTimes="0;0.03;0.15;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <text x="50" y="57" fill="#ffffffd0" font-size="14" font-weight="400" clip-path="url(#tc)">Swap 100 DOT for USDT</text>
    <!-- Cursor -->
    <rect y="42" width="2" height="18" rx="1" fill="#E6007A" class="blink">
      <animate attributeName="x" values="50;50;248;248" keyTimes="0;0.03;0.15;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <!-- Send button -->
    <rect x="442" y="36" width="42" height="32" rx="10" fill="#E6007A50"/>
    <path d="M456,52 L463,46 L463,49 L472,49 L472,55 L463,55 L463,58 Z" fill="#E6007A" transform="rotate(0 463 52)"/>

    <!-- Status label -->
    <text x="260" y="116" fill="#ffffff40" font-size="12" text-anchor="middle" font-weight="400">User typing...</text>
  </g>

  <!-- ====== PHASE: THINKING ====== -->
  <g class="phase-thinking">
    <!-- Input card (filled) -->
    <rect x="24" y="24" width="472" height="56" rx="16" fill="#ffffff05" stroke="#ffffff10" stroke-width="1"/>
    <rect x="36" y="34" width="396" height="36" rx="12" fill="#ffffff06" stroke="#ffffff0c" stroke-width="0.7"/>
    <text x="50" y="57" fill="#ffffffd0" font-size="14">Swap 100 DOT for USDT</text>
    <rect x="442" y="36" width="42" height="32" rx="10" fill="#E6007A"/>
    <path d="M456,52 L463,46 L463,49 L472,49 L472,55 L463,55 L463,58 Z" fill="#ffffff"/>

    <!-- AI sparkle icon -->
    <rect x="36" y="100" width="36" height="36" rx="10" fill="#E6007A12" stroke="#E6007A30" stroke-width="0.7"/>
    <text x="54" y="124" fill="#E6007A" font-size="16" text-anchor="middle">✦</text>

    <!-- Thinking bubble -->
    <rect x="82" y="100" width="100" height="36" rx="12" fill="#ffffff06" stroke="#ffffff0a" stroke-width="0.7"/>
    <circle cx="112" cy="118" r="4" fill="#ffffff60" class="dot-1"/>
    <circle cx="128" cy="118" r="4" fill="#ffffff60" class="dot-2"/>
    <circle cx="144" cy="118" r="4" fill="#ffffff60" class="dot-3"/>

    <text x="260" y="176" fill="#ffffff40" font-size="12" text-anchor="middle">AI analyzing risk...</text>
  </g>

  <!-- ====== PHASE: PREVIEW ====== -->
  <g class="phase-preview">
    <!-- Preview card -->
    <rect x="24" y="24" width="472" height="410" rx="16" fill="#ffffff04" stroke="#ffffff10" stroke-width="1"/>

    <!-- Header -->
    <text x="44" y="54" fill="#ffffff4d" font-size="10" font-weight="600" letter-spacing="2">TRANSACTION PREVIEW</text>
    <text x="470" y="54" fill="#ffffff30" font-size="11" text-anchor="end" class="mono">30s</text>

    <!-- Swap box -->
    <rect x="40" y="68" width="440" height="148" rx="12" fill="#ffffff06" stroke="#ffffff0a" stroke-width="0.7"/>

    <!-- You send -->
    <text x="260" y="94" fill="#ffffff40" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1.5">YOU SEND</text>
    <text x="260" y="120" fill="#ffffffe6" font-size="26" font-weight="700" text-anchor="middle">100 <tspan font-size="18" fill="#ffffff80">DOT</tspan></text>

    <!-- Arrow divider -->
    <circle cx="260" cy="142" r="12" fill="#ffffff08" stroke="#ffffff10" stroke-width="0.7"/>
    <path d="M255,140 L260,146 L265,140" fill="none" stroke="#ffffff40" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- You receive -->
    <text x="260" y="170" fill="#ffffff40" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1.5">YOU RECEIVE</text>
    <text x="260" y="204" fill="#56F39A" font-size="26" font-weight="700" text-anchor="middle">685.42 <tspan font-size="18" fill="#56F39A99">USDT</tspan></text>

    <!-- Stats -->
    <text x="44" y="244" fill="#ffffff50" font-size="12">Slippage</text>
    <text x="476" y="244" fill="#ffffffa0" font-size="12" text-anchor="end">0.31%</text>
    <line x1="44" y1="254" x2="476" y2="254" stroke="#ffffff08"/>
    <text x="44" y="272" fill="#ffffff50" font-size="12">Price Impact</text>
    <text x="476" y="272" fill="#ffffffa0" font-size="12" text-anchor="end">0.01%</text>

    <!-- Risk badge -->
    <rect x="40" y="288" width="440" height="38" rx="10" fill="#56F39A10" stroke="#56F39A35" stroke-width="0.7"/>
    <text x="260" y="312" fill="#56F39A" font-size="13" font-weight="600" text-anchor="middle">✅  LOW RISK</text>

    <!-- Action buttons -->
    <rect x="40" y="340" width="212" height="40" rx="12" fill="none" stroke="#ffffff12" stroke-width="1"/>
    <text x="146" y="365" fill="#ffffff50" font-size="13" text-anchor="middle">Cancel</text>

    <rect x="268" y="340" width="212" height="40" rx="12" fill="#E6007A" filter="url(#glow-pink)"/>
    <text x="374" y="365" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Confirm Swap</text>
  </g>

  <!-- ====== PHASE: CONFIRMING ====== -->
  <g class="phase-confirming">
    <rect x="24" y="24" width="472" height="410" rx="16" fill="#ffffff04" stroke="#ffffff10" stroke-width="1"/>

    <!-- Spinner -->
    <g transform="translate(260, 190)">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#ffffff0c" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#E6007A" stroke-width="2.5" stroke-dasharray="44 132" stroke-linecap="round" style="animation: spinner 1s linear infinite; transform-origin: center"/>
    </g>

    <text x="260" y="242" fill="#ffffffcc" font-size="15" font-weight="500" text-anchor="middle">Confirming on-chain...</text>
    <text x="260" y="264" fill="#ffffff40" font-size="12" text-anchor="middle">Waiting for block confirmation</text>
  </g>

  <!-- ====== PHASE: SUCCESS ====== -->
  <g class="phase-success">
    <rect x="24" y="24" width="472" height="410" rx="16" fill="#ffffff04" stroke="#ffffff10" stroke-width="1"/>

    <!-- Check circle -->
    <circle cx="260" cy="160" r="34" fill="#56F39A0c" stroke="#56F39A" stroke-width="2.5" filter="url(#glow-green)"/>
    <polyline points="244,160 254,170 276,148" fill="none" stroke="#56F39A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="30" style="animation: check-draw 0.5s ease forwards"/>

    <text x="260" y="222" fill="#ffffffe6" font-size="20" font-weight="700" text-anchor="middle">Swap Executed!</text>

    <!-- TX hash box -->
    <rect x="155" y="240" width="210" height="52" rx="10" fill="#ffffff06" stroke="#ffffff0c" stroke-width="0.7"/>
    <text x="260" y="259" fill="#ffffff40" font-size="9" font-weight="600" text-anchor="middle" letter-spacing="1.5">TRANSACTION HASH</text>
    <text x="260" y="280" fill="#00B2FF" font-size="13" text-anchor="middle" class="mono">0x7a3f...b82d</text>

    <!-- Summary -->
    <text x="196" y="322" fill="#ffffff50" font-size="13" text-anchor="middle">100 DOT → 685.42 USDT</text>
    <text x="350" y="322" fill="#56F39A" font-size="13" font-weight="500" text-anchor="middle">✓ Confirmed</text>
  </g>
</svg>
